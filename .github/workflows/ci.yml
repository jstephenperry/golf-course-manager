name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (.NET 8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: server/**/TestResults/*.trx

  client:
    name: Client (Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-results.xml
      - name: Build
        run: npm run build
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-results
          path: client/test-results.xml

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Restore server deps
        working-directory: server
        run: dotnet restore
      - name: Run Playwright (boots server + serves SPA)
        working-directory: client
        env:
          CI: "1"
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report
